name: Deploy to GitHub Pages

# Static Next.js export → GitHub Pages. Content is baked in from
# content/site-data.json; the Drive sync workflow regenerates that file and
# pushes, which re-triggers this deploy. No server anywhere.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required by the official Pages deploy actions
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deploy; don't cancel an in-progress one
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5
        with:
          enablement: true # self-enable Pages so the first run can't race ahead of setup

      - name: Build (Next.js static export)
        # configure-pages outputs /<repo> as base_path for the github.io preview,
        # and '' automatically once the custom domain (omarchaconart.com) is set.
        # NEXT_PUBLIC_BASE_PATH feeds both next.config.mjs and the img() prefix
        # in lib/data.js, so page routes and raw <img> assets stay in sync.
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
